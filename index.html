<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lab Charts — Blood Work Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <header class="header">
    <h1>Lab<span>Charts</span></h1>
    <div class="header-info">
      <div id="profile-selector"></div>
      <div id="header-dates"><span class="label">Dates:</span></div>
      <button class="settings-btn" onclick="openSettingsModal()" title="Settings">&#9881;</button>
      <div class="unit-toggle">
        <button class="unit-toggle-btn active" data-unit="EU" onclick="switchUnitSystem('EU')">EU (SI)</button>
        <button class="unit-toggle-btn" data-unit="US" onclick="switchUnitSystem('US')">US</button>
      </div>
      <button class="chat-toggle-btn" onclick="toggleChatPanel()">Ask AI</button>
    </div>
  </header>

  <div class="layout">
    <nav class="sidebar" id="sidebar-nav"></nav>
    <main class="main" id="main-content"></main>
  </div>

  <div class="modal-overlay" id="modal-overlay">
    <div class="modal" id="detail-modal"></div>
  </div>

  <div class="modal-overlay" id="import-modal-overlay">
    <div class="modal" id="import-modal"></div>
  </div>

  <div class="modal-overlay" id="settings-modal-overlay">
    <div class="modal" id="settings-modal"></div>
  </div>

  <div class="chat-backdrop" id="chat-backdrop" onclick="closeChatPanel()"></div>
  <div class="chat-panel" id="chat-panel">
    <div class="chat-header">
      <span class="chat-header-title">AI Lab Analyst</span>
      <div class="chat-header-actions">
        <button class="chat-clear-btn" onclick="clearChatHistory()" title="Clear history">Clear</button>
        <button class="chat-close-btn" onclick="closeChatPanel()">&times;</button>
      </div>
    </div>
    <div class="chat-messages" id="chat-messages"></div>
    <div class="chat-input-area">
      <textarea class="chat-input" id="chat-input" placeholder="Ask about your lab results..." rows="2" onkeydown="handleChatKeydown(event)"></textarea>
      <button class="chat-send-btn" id="chat-send-btn" onclick="sendChatMessage()">Send</button>
    </div>
  </div>

  <input type="file" id="pdf-input" accept=".pdf,.json" style="display:none">
  <div class="notification-container" id="notification-container"></div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
