<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Get Based — Blood Work Dashboard</title>
  <meta name="description" content="Track and visualize your blood work over time. AI-powered PDF import, trend detection, and health insights in a private, offline-first dashboard.">
  <meta property="og:title" content="Get Based — Blood Work Dashboard">
  <meta property="og:description" content="Track and visualize your blood work over time. AI-powered PDF import, trend detection, and health insights.">
  <meta property="og:type" content="website">
  <link rel="icon" type="image/svg+xml" href="icon.svg">
  <link rel="apple-touch-icon" href="icon-192.png">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#1a1d27">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@500;600;700&family=JetBrains+Mono:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <a href="#main-content" class="skip-link">Skip to main content</a>
  <header class="header">
    <a href="https://getbased.health" style="text-decoration:none;color:inherit"><h1>Get <span>Based</span></h1></a>
    <div class="header-info">
      <div id="profile-selector"></div>
      <div id="header-dates"><span class="label">Dates:</span></div>
      <div id="header-range-toggle" class="range-toggle"></div>
      <a href="/docs" class="glossary-btn" title="Documentation" aria-label="Documentation" style="text-decoration:none">&#128196;</a>
      <button class="settings-btn" onclick="openSettingsModal()" title="Settings" aria-label="Settings">&#9881;</button>
      <button class="glossary-btn" onclick="openGlossary()" title="Marker Glossary" aria-label="Marker Glossary">&#128214;</button>
      <button class="glossary-btn feedback-btn" onclick="openFeedbackModal()" title="Send Feedback" aria-label="Send Feedback">&#128027;</button>
      <button class="chat-toggle-btn" onclick="toggleChatPanel()">Ask AI</button>
    </div>
  </header>

  <div class="layout">
    <nav class="sidebar" id="sidebar-nav"></nav>
    <main class="main" id="main-content"></main>
  </div>

  <div class="modal-overlay" id="modal-overlay">
    <div class="modal" id="detail-modal" role="dialog" aria-modal="true"></div>
  </div>

  <div class="modal-overlay" id="import-modal-overlay">
    <div class="modal" id="import-modal" role="dialog" aria-modal="true"></div>
  </div>

  <div class="modal-overlay" id="settings-modal-overlay">
    <div class="modal" id="settings-modal" role="dialog" aria-modal="true" aria-label="Settings"></div>
  </div>

  <div class="modal-overlay" id="glossary-modal-overlay">
    <div class="modal glossary-modal" id="glossary-modal" role="dialog" aria-modal="true" aria-label="Marker Glossary"></div>
  </div>

  <div class="modal-overlay" id="feedback-modal-overlay">
    <div class="modal" id="feedback-modal" role="dialog" aria-modal="true" aria-label="Send Feedback" style="max-width:540px"></div>
  </div>

  <div class="modal-overlay" id="changelog-modal-overlay">
    <div class="modal" id="changelog-modal" role="dialog" aria-modal="true" aria-label="What's New" style="max-width:600px"></div>
  </div>

  <div class="chat-backdrop" id="chat-backdrop" onclick="closeChatPanel()"></div>
  <div class="chat-panel" id="chat-panel" role="complementary" aria-label="AI Lab Analyst">
    <div class="chat-thread-rail" id="chat-thread-rail">
      <div class="chat-thread-rail-header">
        <button class="chat-rail-back" onclick="toggleThreadRail()" aria-label="Close conversations">&larr;</button>
        <span class="chat-thread-rail-title">Conversations</span>
        <button class="chat-thread-new-btn" onclick="createNewThread()" title="New conversation" aria-label="New conversation">+</button>
      </div>
      <input type="text" class="chat-thread-search" id="chat-thread-search" placeholder="Search..." oninput="filterThreadList(this.value)">
      <div class="chat-thread-list" id="chat-thread-list"></div>
    </div>
    <div class="chat-panel-conversation">
      <div class="chat-header">
        <div class="chat-header-left">
          <button class="chat-rail-toggle" onclick="toggleThreadRail()" title="Conversations" aria-label="Toggle conversations">&#9776;</button>
          <span class="chat-header-title">AI Lab Analyst</span>
        </div>
        <div class="chat-header-actions">
          <label class="chat-sources-toggle-label" title="Include scientific paper references">
            <span class="chat-sources-toggle-text">Sources (experimental)</span>
            <input type="checkbox" id="chat-sources-checkbox" onchange="setChatSourcesEnabled(this.checked)">
            <span class="chat-sources-slider"></span>
          </label>
          <button class="chat-clear-btn" onclick="clearChatHistory()" title="Clear history">Clear</button>
          <button class="chat-close-btn" onclick="closeChatPanel()" aria-label="Close chat">&times;</button>
        </div>
      </div>
      <div class="chat-personality-bar">
        <div class="chat-personality-current" onclick="togglePersonalityBar()">
          <span class="chat-personality-current-icon">&#128300;</span>
          <span class="chat-personality-current-name">AI Lab Analyst</span>
          <span class="chat-personality-current-arrow">&#9662;</span>
        </div>
        <div class="chat-personality-options">
          <button class="chat-personality-opt active" data-personality="default" onclick="setChatPersonality('default')">
            <span class="chat-personality-opt-icon">&#128300;</span>
            <div class="chat-personality-opt-info">
              <span class="chat-personality-opt-name">AI Lab Analyst</span>
              <span class="chat-personality-opt-desc">Neutral, professional analysis</span>
            </div>
            <span class="chat-personality-opt-check">&#10003;</span>
          </button>
          <div class="chat-personality-divider">Fictional Characters</div>
          <button class="chat-personality-opt" data-personality="house" onclick="setChatPersonality('house')">
            <span class="chat-personality-opt-icon">&#129455;</span>
            <div class="chat-personality-opt-info">
              <span class="chat-personality-opt-name">Dr. Gregory House</span>
              <span class="chat-personality-opt-desc">Sarcastic, brilliant, blunt</span>
            </div>
            <span class="chat-personality-opt-check">&#10003;</span>
          </button>
          <button class="chat-personality-opt" data-personality="custom" onclick="setChatPersonality('custom')">
            <span class="chat-personality-opt-icon">&#9999;&#65039;</span>
            <div class="chat-personality-opt-info">
              <span class="chat-personality-opt-name">Custom Personality</span>
              <span class="chat-personality-opt-desc">Define your own style</span>
            </div>
            <span class="chat-personality-opt-check">&#10003;</span>
          </button>
          <div class="chat-personality-custom-area" style="display:none">
            <div class="chat-personality-custom-header">
              <input type="text" id="chat-personality-custom-name" class="chat-personality-custom-name-input" placeholder="e.g. Dr. Jack Kruse" maxlength="60" oninput="markPersonalityDirty()">
              <button id="chat-personality-generate-btn" class="chat-personality-generate-btn" onclick="generateCustomPersonality()">Generate</button>
            </div>
            <textarea class="chat-personality-custom-textarea" placeholder="Describe how you want the AI to communicate, or type a name above and click Generate..." oninput="autoResizePersonaTextarea(); markPersonalityDirty()"></textarea>
            <div class="chat-personality-custom-footer">
              <label class="chat-personality-evidence-label"><input type="checkbox" id="chat-personality-evidence-based" onchange="markPersonalityDirty()"> Enforce evidence-based accuracy</label>
              <button class="chat-personality-custom-save" onclick="saveCustomPersonality()" disabled>Save</button>
            </div>
          </div>
        </div>
      </div>
      <div class="chat-messages" id="chat-messages"></div>
      <div class="chat-input-area">
        <textarea class="chat-input" id="chat-input" placeholder="Ask about your lab results..." rows="2" onkeydown="handleChatKeydown(event)"></textarea>
        <button class="chat-send-btn" id="chat-send-btn" onclick="sendChatMessage()" aria-label="Send message">&#10148;</button>
      </div>
    </div>
  </div>

  <input type="file" id="pdf-input" accept=".pdf,.json" style="display:none" multiple>
  <div class="notification-container" id="notification-container" aria-live="polite" role="status"></div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js" integrity="sha384-vsrfeLOOY6KuIYKDlmVH5UiBmgIdB1oEf7p01YgWHuqmOHfZr374+odEv96n9tNC" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.min.js" integrity="sha384-/1qUCSGwTur9vjf/z9lmu/eCUYbpOTgSjmpbMQZ1/CtX2v/WcAIKqRv+U1DUCG6e" crossorigin="anonymous"></script>
  <script type="module" src="js/main.js"></script>
  <script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/service-worker.js').catch(() => {});
  }
  </script>
</body>
</html>
