<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lab Charts — Blood Work Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
/* Lab Charts Dashboard - Professional Medical Dashboard */
:root {
  --bg-primary: #0f1117;
  --bg-secondary: #1a1d27;
  --bg-card: #222635;
  --bg-hover: #2a2e3d;
  --border: #2e3348;
  --text-primary: #e8eaf0;
  --text-secondary: #8b90a0;
  --text-muted: #5a5f73;
  --accent: #4f8cff;
  --accent-light: #6ba0ff;
  --green: #34d399;
  --green-bg: rgba(52, 211, 153, 0.1);
  --red: #f87171;
  --red-bg: rgba(248, 113, 113, 0.1);
  --yellow: #fbbf24;
  --yellow-bg: rgba(251, 191, 36, 0.1);
  --ref-band: rgba(79, 140, 255, 0.08);
  --ref-border: rgba(79, 140, 255, 0.25);
  --shadow: 0 2px 8px rgba(0,0,0,0.3);
  --radius: 12px;
  --radius-sm: 8px;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: var(--bg-primary);
  color: var(--text-primary);
  line-height: 1.5;
  overflow-x: hidden;
}
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--bg-primary); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
.header {
  background: var(--bg-secondary);
  border-bottom: 1px solid var(--border);
  padding: 16px 32px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 100;
}
.header h1 { font-size: 20px; font-weight: 700; letter-spacing: -0.3px; }
.header h1 span { color: var(--accent); }
.header-info { display: flex; gap: 24px; font-size: 13px; color: var(--text-secondary); }
.header-info .label { color: var(--text-muted); margin-right: 4px; }
.layout { display: flex; min-height: calc(100vh - 57px); }
.sidebar {
  width: 260px;
  background: var(--bg-secondary);
  border-right: 1px solid var(--border);
  padding: 16px 0;
  flex-shrink: 0;
  overflow-y: auto;
  position: sticky;
  top: 57px;
  height: calc(100vh - 57px);
}
.sidebar-title {
  font-size: 11px; font-weight: 600; text-transform: uppercase;
  letter-spacing: 1px; color: var(--text-muted); padding: 8px 20px; margin-top: 8px;
}
.nav-item {
  display: flex; align-items: center; gap: 10px; padding: 10px 20px;
  cursor: pointer; font-size: 14px; color: var(--text-secondary);
  transition: all 0.15s; border-left: 3px solid transparent;
}
.nav-item:hover { background: var(--bg-hover); color: var(--text-primary); }
.nav-item.active {
  background: rgba(79, 140, 255, 0.08); color: var(--accent);
  border-left-color: var(--accent); font-weight: 500;
}
.nav-item .icon { font-size: 16px; width: 24px; text-align: center; }
.nav-item .count {
  margin-left: auto; font-size: 11px; background: var(--bg-card);
  padding: 1px 7px; border-radius: 10px; color: var(--text-muted);
}
.nav-item .flag-count {
  margin-left: auto; font-size: 11px; background: var(--red-bg);
  padding: 1px 7px; border-radius: 10px; color: var(--red); font-weight: 600;
}
.main { flex: 1; padding: 24px 32px; max-width: calc(100vw - 260px); }
.category-header { margin-bottom: 24px; }
.category-header h2 {
  font-size: 24px; font-weight: 700; letter-spacing: -0.3px;
  display: flex; align-items: center; gap: 10px;
}
.category-header p { color: var(--text-secondary); font-size: 14px; margin-top: 4px; }
.view-toggle {
  display: flex; gap: 4px; background: var(--bg-secondary); padding: 3px;
  border-radius: var(--radius-sm); border: 1px solid var(--border);
  margin-bottom: 20px; width: fit-content;
}
.view-btn {
  padding: 6px 16px; border-radius: 6px; border: none; background: transparent;
  color: var(--text-secondary); font-size: 13px; cursor: pointer;
  font-weight: 500; transition: all 0.15s;
}
.view-btn.active { background: var(--accent); color: white; }
.view-btn:hover:not(.active) { background: var(--bg-hover); }
.overview-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 16px; margin-bottom: 32px;
}
.overview-card {
  background: var(--bg-card); border-radius: var(--radius);
  border: 1px solid var(--border); padding: 20px; cursor: pointer; transition: all 0.2s;
}
.overview-card:hover {
  border-color: var(--accent); transform: translateY(-2px); box-shadow: var(--shadow);
}
.overview-card-header {
  display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px;
}
.overview-card-title { font-size: 14px; font-weight: 600; color: var(--text-primary); }
.overview-card-icon { font-size: 20px; }
.overview-stats { display: flex; gap: 16px; }
.overview-stat { font-size: 12px; }
.overview-stat .stat-value { font-size: 22px; font-weight: 700; }
.overview-stat .stat-label { color: var(--text-muted); font-size: 11px; }
.stat-normal .stat-value { color: var(--green); }
.stat-flagged .stat-value { color: var(--red); }
.stat-total .stat-value { color: var(--text-secondary); }
.alerts-section { margin-bottom: 32px; }
.alerts-title {
  font-size: 16px; font-weight: 600; margin-bottom: 12px;
  display: flex; align-items: center; gap: 8px;
}
.alert-card {
  background: var(--bg-card); border-radius: var(--radius-sm);
  border: 1px solid var(--border); padding: 14px 18px; margin-bottom: 8px;
  display: flex; align-items: center; gap: 12px; cursor: pointer; transition: all 0.15s;
}
.alert-card:hover { border-color: var(--accent); }
.alert-card.alert-high { border-left: 3px solid var(--red); }
.alert-card.alert-low { border-left: 3px solid var(--yellow); }
.alert-indicator {
  font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 4px; white-space: nowrap;
}
.alert-high .alert-indicator { background: var(--red-bg); color: var(--red); }
.alert-low .alert-indicator { background: var(--yellow-bg); color: var(--yellow); }
.alert-name { font-size: 14px; font-weight: 500; flex: 1; }
.alert-value { font-size: 14px; font-weight: 600; font-variant-numeric: tabular-nums; }
.alert-ref { font-size: 12px; color: var(--text-muted); width: 120px; text-align: right; }
.charts-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(440px, 1fr)); gap: 20px;
}
.chart-card {
  background: var(--bg-card); border-radius: var(--radius);
  border: 1px solid var(--border); padding: 20px; transition: all 0.2s; cursor: pointer;
}
.chart-card:hover { border-color: var(--accent); }
.chart-card-header {
  display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 16px;
}
.chart-card-title { font-size: 14px; font-weight: 600; }
.chart-card-unit { font-size: 12px; color: var(--text-muted); }
.chart-card-status {
  font-size: 11px; font-weight: 600; padding: 2px 10px; border-radius: 20px;
}
.status-normal { background: var(--green-bg); color: var(--green); }
.status-high { background: var(--red-bg); color: var(--red); }
.status-low { background: var(--yellow-bg); color: var(--yellow); }
.status-missing { background: var(--bg-hover); color: var(--text-muted); }
.chart-container { position: relative; height: 200px; }
.chart-values {
  display: flex; justify-content: space-around; margin-top: 12px;
  padding-top: 12px; border-top: 1px solid var(--border);
}
.chart-value-item { text-align: center; }
.chart-value-date { font-size: 11px; color: var(--text-muted); }
.chart-value-num { font-size: 16px; font-weight: 700; font-variant-numeric: tabular-nums; }
.chart-value-num.val-normal { color: var(--green); }
.chart-value-num.val-high { color: var(--red); }
.chart-value-num.val-low { color: var(--yellow); }
.chart-value-num.val-missing { color: var(--text-muted); }
.chart-ref-range { font-size: 11px; color: var(--text-muted); margin-top: 8px; text-align: center; }
.data-table-wrapper { overflow-x: auto; }
.data-table { width: 100%; border-collapse: collapse; font-size: 14px; }
.data-table thead th {
  background: var(--bg-secondary); padding: 12px 16px; text-align: left;
  font-weight: 600; font-size: 12px; text-transform: uppercase;
  letter-spacing: 0.5px; color: var(--text-muted);
  border-bottom: 1px solid var(--border); position: sticky; top: 0;
}
.data-table tbody tr { border-bottom: 1px solid var(--border); transition: background 0.1s; }
.data-table tbody tr:hover { background: var(--bg-hover); }
.data-table td { padding: 12px 16px; font-variant-numeric: tabular-nums; }
.data-table .marker-name { font-weight: 500; }
.data-table .unit-col { color: var(--text-muted); font-size: 12px; }
.data-table .ref-col { color: var(--text-secondary); font-size: 13px; }
.data-table .value-cell { font-weight: 600; }
.data-table .value-cell.val-normal { color: var(--green); }
.data-table .value-cell.val-high { color: var(--red); }
.data-table .value-cell.val-low { color: var(--yellow); }
.data-table .value-cell.val-missing { color: var(--text-muted); font-weight: 400; }
.trend-arrow { font-size: 12px; margin-left: 4px; }
.trend-up { color: var(--red); }
.trend-down { color: var(--green); }
.trend-stable { color: var(--text-muted); }
.range-bar {
  width: 120px; height: 8px; background: var(--bg-primary);
  border-radius: 4px; position: relative; overflow: visible; margin: 4px 0;
}
.range-bar-fill {
  position: absolute; height: 100%; border-radius: 4px; background: var(--ref-border);
}
.range-bar-marker {
  position: absolute; width: 10px; height: 10px; border-radius: 50%;
  top: -1px; transform: translateX(-50%); border: 2px solid var(--bg-card);
}
.range-bar-marker.marker-normal { background: var(--green); }
.range-bar-marker.marker-high { background: var(--red); }
.range-bar-marker.marker-low { background: var(--yellow); }
.fatty-acids-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 12px;
}
.fa-card {
  background: var(--bg-card); border-radius: var(--radius-sm);
  border: 1px solid var(--border); padding: 16px;
}
.fa-card-name { font-size: 13px; font-weight: 600; margin-bottom: 8px; }
.fa-card-value { font-size: 24px; font-weight: 700; font-variant-numeric: tabular-nums; }
.fa-card-ref { font-size: 12px; color: var(--text-muted); margin-top: 4px; }
.modal-overlay {
  position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.7); z-index: 200; display: none;
  align-items: center; justify-content: center;
}
.modal-overlay.show { display: flex; }
.modal {
  background: var(--bg-secondary); border-radius: var(--radius);
  border: 1px solid var(--border); width: 90%; max-width: 700px;
  max-height: 85vh; overflow-y: auto; padding: 32px;
}
.modal-close {
  float: right; background: none; border: none; color: var(--text-muted);
  font-size: 24px; cursor: pointer; padding: 0 4px;
}
.modal-close:hover { color: var(--text-primary); }
.modal h3 { font-size: 20px; font-weight: 700; margin-bottom: 4px; }
.modal .modal-unit { color: var(--text-muted); font-size: 14px; margin-bottom: 20px; }
.modal .modal-chart { height: 250px; margin-bottom: 24px; }
.modal-values-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 12px; margin-bottom: 20px;
}
.modal-value-card {
  background: var(--bg-card); border-radius: var(--radius-sm); padding: 14px; text-align: center;
}
.modal-value-card .mv-date { font-size: 12px; color: var(--text-muted); margin-bottom: 4px; }
.modal-value-card .mv-value {
  font-size: 28px; font-weight: 700; font-variant-numeric: tabular-nums;
}
.modal-value-card .mv-status { font-size: 11px; font-weight: 600; margin-top: 4px; }
.modal-ref-info {
  background: var(--bg-card); border-radius: var(--radius-sm);
  padding: 14px 18px; font-size: 13px; color: var(--text-secondary);
}
.modal-ref-info strong { color: var(--text-primary); }
@media (max-width: 1024px) {
  .sidebar { width: 220px; }
  .charts-grid { grid-template-columns: 1fr; }
  .main { padding: 20px; }
}
@media (max-width: 768px) {
  .layout { flex-direction: column; }
  .sidebar {
    width: 100%; position: static; height: auto;
    display: flex; flex-wrap: wrap; padding: 8px; gap: 4px;
  }
  .sidebar-title { display: none; }
  .nav-item { padding: 8px 12px; font-size: 12px; border-left: none; border-radius: var(--radius-sm); }
  .nav-item.active { border-left: none; background: var(--accent); color: white; }
  .main { max-width: 100%; }
  .charts-grid { grid-template-columns: 1fr; }
  .overview-grid { grid-template-columns: 1fr; }
  .header { padding: 12px 16px; flex-wrap: wrap; gap: 8px; }
  .modal-values-grid { grid-template-columns: 1fr; }
}
/* Unit Toggle */
.unit-toggle { display: flex; align-items: center; gap: 4px; }
.unit-toggle-btn {
  padding: 4px 12px; border-radius: 6px; border: 1px solid var(--border);
  background: transparent; color: var(--text-secondary); font-size: 12px;
  cursor: pointer; font-weight: 500; transition: all 0.15s; font-family: inherit;
}
.unit-toggle-btn.active { background: var(--accent); color: white; border-color: var(--accent); }
.unit-toggle-btn:hover:not(.active) { background: var(--bg-hover); }
/* Drop Zone */
.drop-zone {
  border: 2px dashed var(--border); border-radius: var(--radius);
  padding: 32px; text-align: center; cursor: pointer;
  transition: all 0.2s; margin-bottom: 24px; background: var(--bg-card);
}
.drop-zone:hover, .drop-zone.drag-over { border-color: var(--accent); background: rgba(79,140,255,0.05); }
.drop-zone-icon { font-size: 28px; margin-bottom: 6px; }
.drop-zone-text { font-size: 14px; color: var(--text-secondary); }
.drop-zone-hint { font-size: 12px; color: var(--text-muted); margin-top: 4px; }
/* Notification Toast */
.notification-container {
  position: fixed; top: 72px; right: 24px; z-index: 300;
  display: flex; flex-direction: column; gap: 8px;
}
.notification-toast {
  background: var(--bg-secondary); border: 1px solid var(--border);
  border-radius: var(--radius-sm); padding: 12px 20px;
  font-size: 13px; color: var(--text-primary); min-width: 280px;
  box-shadow: var(--shadow); animation: toastIn 0.3s ease;
  display: flex; align-items: center; gap: 8px;
}
.notification-toast.success { border-left: 3px solid var(--green); }
.notification-toast.error { border-left: 3px solid var(--red); }
.notification-toast.info { border-left: 3px solid var(--accent); }
@keyframes toastIn { from { transform: translateX(100%); opacity:0; } to { transform:translateX(0); opacity:1; } }
/* Import Preview */
.import-table { width: 100%; border-collapse: collapse; font-size: 13px; margin: 16px 0; }
.import-table th {
  background: var(--bg-card); padding: 8px 12px; text-align: left;
  font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-muted);
}
.import-table td { padding: 8px 12px; border-bottom: 1px solid var(--border); }
.import-table .matched { color: var(--green); }
.import-table .unmatched { color: var(--yellow); }
.import-table .skipped { color: var(--text-muted); }
.import-btn {
  padding: 8px 24px; border-radius: 6px; border: none;
  font-size: 14px; font-weight: 500; cursor: pointer; font-family: inherit; transition: all 0.15s;
}
.import-btn-primary { background: var(--accent); color: white; }
.import-btn-primary:hover { background: var(--accent-light); }
.import-btn-secondary { background: var(--bg-card); color: var(--text-secondary); border: 1px solid var(--border); }
.import-btn-secondary:hover { background: var(--bg-hover); }
/* Correlation View */
.correlation-controls {
  background: var(--bg-card); border-radius: var(--radius);
  border: 1px solid var(--border); padding: 20px; margin-bottom: 20px;
}
.correlation-controls h3 { font-size: 16px; margin-bottom: 12px; }
.corr-select-row { display: flex; gap: 12px; align-items: flex-start; flex-wrap: wrap; }
.corr-dropdown { position: relative; flex: 1; min-width: 250px; }
.corr-search {
  width: 100%; padding: 8px 12px; border-radius: 6px;
  border: 1px solid var(--border); background: var(--bg-primary);
  color: var(--text-primary); font-size: 13px; font-family: inherit;
}
.corr-search:focus { outline: none; border-color: var(--accent); }
.corr-options {
  position: absolute; top: 100%; left: 0; right: 0; z-index: 50;
  background: var(--bg-secondary); border: 1px solid var(--border);
  border-radius: 0 0 6px 6px; max-height: 250px; overflow-y: auto; display: none;
}
.corr-options.show { display: block; }
.corr-option {
  padding: 8px 12px; cursor: pointer; font-size: 13px;
  color: var(--text-secondary); transition: background 0.1s;
}
.corr-option:hover { background: var(--bg-hover); color: var(--text-primary); }
.corr-option.selected { color: var(--accent); }
.corr-option .opt-cat { font-size: 11px; color: var(--text-muted); margin-left: 6px; }
.corr-chips { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 12px; }
.corr-chip {
  display: flex; align-items: center; gap: 4px; padding: 4px 10px;
  border-radius: 20px; font-size: 12px; font-weight: 500; border: 1px solid;
}
.corr-chip .chip-remove { cursor: pointer; font-size: 14px; margin-left: 2px; opacity: 0.7; }
.corr-chip .chip-remove:hover { opacity: 1; }
.corr-presets { margin-top: 12px; }
.corr-presets-label { font-size: 12px; color: var(--text-muted); margin-bottom: 6px; }
.corr-preset-btn {
  display: inline-block; padding: 4px 10px; border-radius: 4px;
  border: 1px solid var(--border); background: transparent;
  color: var(--text-secondary); font-size: 12px; cursor: pointer;
  font-family: inherit; margin: 2px; transition: all 0.15s;
}
.corr-preset-btn:hover { border-color: var(--accent); color: var(--accent); }
.corr-chart-container {
  background: var(--bg-card); border-radius: var(--radius);
  border: 1px solid var(--border); padding: 20px;
}
.corr-chart-container h3 { font-size: 16px; margin-bottom: 16px; }
.corr-chart { height: 400px; }
.imported-entries { margin-bottom: 20px; }
.imported-entry {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 16px; background: var(--bg-card); border: 1px solid var(--border);
  border-radius: var(--radius-sm); margin-bottom: 6px; font-size: 13px;
}
.imported-entry .ie-info { color: var(--text-secondary); }
.imported-entry .ie-date { color: var(--text-primary); font-weight: 500; }
.imported-entry .ie-count { color: var(--text-muted); margin-left: 8px; }
.imported-entry .ie-remove {
  background: none; border: none; color: var(--text-muted); cursor: pointer;
  font-size: 12px; padding: 4px 10px; border-radius: 4px; transition: all 0.15s; font-family: inherit;
}
.imported-entry .ie-remove:hover { color: var(--red); background: var(--red-bg); }
  </style>
</head>
<body>

  <header class="header">
    <h1>Lab<span>Charts</span></h1>
    <div class="header-info">
      <div><span class="label">Lab:</span> SPADIA LAB, Ostrava</div>
      <div><span class="label">Sex:</span> Male</div>
      <div id="header-dates"><span class="label">Dates:</span> Jul 2024 &middot; Jul 2025 &middot; Jan 2026</div>
      <div class="unit-toggle">
        <button class="unit-toggle-btn active" data-unit="EU" onclick="switchUnitSystem('EU')">EU (SI)</button>
        <button class="unit-toggle-btn" data-unit="US" onclick="switchUnitSystem('US')">US</button>
      </div>
    </div>
  </header>

  <div class="layout">
    <nav class="sidebar" id="sidebar-nav"></nav>
    <main class="main" id="main-content"></main>
  </div>

  <div class="modal-overlay" id="modal-overlay">
    <div class="modal" id="detail-modal"></div>
  </div>

  <div class="modal-overlay" id="import-modal-overlay">
    <div class="modal" id="import-modal"></div>
  </div>

  <input type="file" id="pdf-input" accept=".pdf" style="display:none">
  <div class="notification-container" id="notification-container"></div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.min.js"></script>
  <script>
// ═══════════════════════════════════════════════
// DATA
// ═══════════════════════════════════════════════
const LAB_DATA = {
  dates: ["2024-07-08", "2025-07-16", "2026-01-16"],
  dateLabels: ["Jul 2024", "Jul 2025", "Jan 2026"],
  categories: {
    biochemistry: {
      label: "Biochemistry", icon: "\u{1F9EA}",
      markers: {
        glucose: { name: "Glucose (Gluk\u00f3za)", unit: "mmol/l", refMin: 4.11, refMax: 5.60, values: [4.40, 4.33, 4.77] },
        urea: { name: "Urea", unit: "mmol/l", refMin: 2.8, refMax: 8.3, values: [6.8, 5.8, 4.6] },
        creatinine: { name: "Creatinine (Kreatinin)", unit: "\u00b5mol/l", refMin: 62, refMax: 106, values: [24, 36, 30] },

function getStatus(value, refMin, refMax) {
  if (value === null || value === undefined) return "missing";
  if (value < refMin) return "low";
  if (value > refMax) return "high";
  return "normal";
}
function getRangePosition(value, refMin, refMax) {
  if (value === null) return null;
  return ((value - refMin) / (refMax - refMin)) * 100;
}

function getActiveData() {
  const data = JSON.parse(JSON.stringify(LAB_DATA));
  if (importedData && importedData.entries && importedData.entries.length > 0) {
    mergeImportedIntoData(data);
  }
  data.dateLabels = data.dates.map(d => {
    const dt = new Date(d + 'T00:00:00');
    return dt.toLocaleDateString('en-US', { month: 'short', year: 'numeric' });
  });
  if (unitSystem === 'US') applyUnitConversion(data);
  return data;
}

function mergeImportedIntoData(data) {
  const existingDates = [...data.dates];
  const importedDates = importedData.entries.map(e => e.date);
  const allDates = [...new Set([...existingDates, ...importedDates])].sort();
  const importLookup = {};
  for (const entry of importedData.entries) importLookup[entry.date] = entry.markers;
  for (const [catKey, cat] of Object.entries(data.categories)) {
    for (const [markerKey, marker] of Object.entries(cat.markers)) {
      if (marker.singlePoint) continue;
      const fullKey = `${catKey}.${markerKey}`;
      marker.values = allDates.map(date => {
        const origIdx = existingDates.indexOf(date);
        if (origIdx !== -1 && origIdx < marker.values.length && marker.values[origIdx] !== null) {
          return marker.values[origIdx];
        }
        if (importLookup[date] && importLookup[date][fullKey] !== undefined) {
          return importLookup[date][fullKey];
        }
        if (origIdx !== -1 && origIdx < marker.values.length) return marker.values[origIdx];
        return null;
      });
    }
  }
  data.dates = allDates;
}

function applyUnitConversion(data) {
  for (const [catKey, cat] of Object.entries(data.categories)) {
    for (const [markerKey, marker] of Object.entries(cat.markers)) {
      const conv = UNIT_CONVERSIONS[`${catKey}.${markerKey}`];
      if (!conv) continue;
      if (conv.type === 'multiply') {
        marker.values = marker.values.map(v => v !== null ? parseFloat((v * conv.factor).toPrecision(4)) : null);
        marker.refMin = parseFloat((marker.refMin * conv.factor).toPrecision(4));
        marker.refMax = parseFloat((marker.refMax * conv.factor).toPrecision(4));
        marker.unit = conv.usUnit;
      } else if (conv.type === 'hba1c') {
        marker.values = marker.values.map(v => v !== null ? parseFloat(((v / 10.929) + 2.15).toFixed(1)) : null);
        marker.refMin = parseFloat(((marker.refMin / 10.929) + 2.15).toFixed(1));
        marker.refMax = parseFloat(((marker.refMax / 10.929) + 2.15).toFixed(1));
        marker.unit = '%';
      }
    }
  }
}

function recalculateHOMAIR(entry) {
  const glucose = entry.markers["biochemistry.glucose"];
  const insulin = entry.markers["hormones.insulin"] || entry.markers["diabetes.insulin_d"];
  if (glucose !== undefined && insulin !== undefined) {
    entry.markers["diabetes.homaIR"] = Math.round((glucose * insulin) / 22.5 * 100) / 100;
  }
}

  const data = getActiveData();

  let html = `<div class="nav-item active" data-category="dashboard" onclick="navigate('dashboard')">
    <span class="icon">\uD83D\uDCCB</span> Dashboard</div>`;

  html += `<div class="sidebar-title">Categories</div>`;
  for (const [key, cat] of Object.entries(data.categories)) {
    const markers = Object.values(cat.markers);
    const flagged = countFlagged(markers);
    const flagHtml = flagged > 0
      ? `<span class="flag-count">${flagged}</span>`
      : `<span class="count">${markers.length}</span>`;
    html += `<div class="nav-item" data-category="${key}" onclick="navigate('${key}')">

  document.querySelectorAll(".nav-item").forEach(el => {

  if (category === "dashboard") showDashboard();
  else if (category === "correlations") showCorrelations();

  document.querySelectorAll(".view-btn").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  destroyAllCharts();
  const data = getActiveData();
  const cat = data.categories[categoryKey];
  const container = document.getElementById("view-content");
  if (view === "table") {
    container.innerHTML = renderTableView(cat, data.dateLabels);
  } else {
    if (cat.singleDate) {
      container.innerHTML = renderFattyAcidsView(cat);
      renderFattyAcidsCharts(cat);
    } else {
      let html = `<div class="charts-grid">`;
      for (const [key, marker] of Object.entries(cat.markers)) {
        html += renderChartCard(categoryKey + "_" + key, marker, data.dateLabels);
      }

      container.innerHTML = html;
      for (const [key, marker] of Object.entries(cat.markers)) {
        createLineChart(categoryKey + "_" + key, marker, data.dateLabels);
      }
    }
  }
}

function renderChartCard(id, marker, dateLabels) {
  markerRegistry[id] = marker;
  const latestIdx = getLatestValueIndex(marker.values);
  const latestVal = latestIdx !== -1 ? marker.values[latestIdx] : null;
  const status = latestVal !== null ? getStatus(latestVal, marker.refMin, marker.refMax) : "missing";
  const statusLabel = status === "normal" ? "Normal" : status === "high" ? "High" : status === "low" ? "Low" : "N/A";

  let html = `<div class="chart-card" onclick="showDetailModal('${id}')">
    <div class="chart-card-header"><div>
      <div class="chart-card-title">${marker.name}</div>
      <div class="chart-card-unit">${marker.unit}</div></div>
      <span class="chart-card-status status-${status}">${statusLabel}</span></div>
    <div class="chart-container"><canvas id="chart-${id}"></canvas></div>
    <div class="chart-values">`;
  const labels = marker.singlePoint ? ["Jul 2024"] : (dateLabels || LAB_DATA.dateLabels);
  for (let i = 0; i < marker.values.length; i++) {
    const v = marker.values[i];

// Chart.js plugin for reference range band
const refBandPlugin = {
  id: "refBand",
  beforeDraw(chart) {
    const opts = chart.options.plugins.refBand;
    if (!opts || !chart.chartArea) return;
    const { ctx, chartArea: { left, right }, scales: { y } } = chart;
    if (!y) return;
    const yMin = y.getPixelForValue(opts.refMin);
    const yMax = y.getPixelForValue(opts.refMax);
    ctx.save();
    ctx.fillStyle = "rgba(79,140,255,0.06)";
    ctx.fillRect(left, Math.min(yMin,yMax), right-left, Math.abs(yMax-yMin));
    ctx.strokeStyle = "rgba(79,140,255,0.2)";
    ctx.setLineDash([4,4]); ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(left,yMin); ctx.lineTo(right,yMin); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(left,yMax); ctx.lineTo(right,yMax); ctx.stroke();
    ctx.restore();
  }
};

function createLineChart(id, marker, dateLabels) {
  const canvas = document.getElementById("chart-" + id);
  if (!canvas) return;
  const dates = marker.singlePoint ? ["Jul 2024"] : (dateLabels || getActiveData().dateLabels);
  const values = marker.values;
  const valid = values.filter(v => v !== null);
  if (valid.length === 0) return;
  const minV = Math.min(...valid, marker.refMin);
  const maxV = Math.max(...valid, marker.refMax);
  const pad = (maxV - minV) * 0.15 || 1;
  const ptColors = values.map(v => {
    if (v === null) return "transparent";
    const s = getStatus(v, marker.refMin, marker.refMax);
    return s==="normal"?"#34d399":s==="high"?"#f87171":"#fbbf24";
  });
  chartInstances[id] = new Chart(canvas, {
    type: "line",
    data: { labels: dates, datasets: [{
      data: values, borderColor: "#4f8cff", backgroundColor: "rgba(79,140,255,0.1)",
      borderWidth: 2.5, pointBackgroundColor: ptColors, pointBorderColor: ptColors,
      pointRadius: 6, pointHoverRadius: 8, tension: 0.3, fill: false, spanGaps: false
    }]},
    options: { responsive:true, maintainAspectRatio:false,
      plugins: { legend:{display:false},
        tooltip:{ backgroundColor:"#222635", titleColor:"#e8eaf0", bodyColor:"#8b90a0", borderColor:"#2e3348", borderWidth:1,
          callbacks:{ label:(c)=>`${formatValue(c.parsed.y)} ${marker.unit}`, afterLabel:()=>`Ref: ${marker.refMin} \u2013 ${marker.refMax}` }},
        refBand:{ refMin:marker.refMin, refMax:marker.refMax }},
      scales: { x:{ticks:{color:"#5a5f73",font:{size:11}},grid:{display:false}},
        y:{min:minV-pad, max:maxV+pad, ticks:{color:"#5a5f73",font:{size:10}}, grid:{color:"rgba(46,51,72,0.5)"}}}
    },
    plugins: [refBandPlugin]
  });
}

function destroyAllCharts() {
  for (const c of Object.values(chartInstances)) c.destroy();
  chartInstances = {};

function countFlagged(markers) {
  let c = 0;
  for (const m of markers) { const i = getLatestValueIndex(m.values); if (i!==-1 && getStatus(m.values[i],m.refMin,m.refMax)!=="normal") c++; }
  return c;
}
function countMissing(markers) {
  let c = 0;
  for (const m of markers) { if (m.values.every(v=>v===null)) c++; }
  return c;
}
function getLatestValueIndex(values) {
  for (let i=values.length-1;i>=0;i--) if (values[i]!==null) return i;
  return -1;
}
function getAllFlaggedMarkers(data) {
  if (!data) data = getActiveData();
  const flags = [];
  for (const [ck, cat] of Object.entries(data.categories)) {
    for (const [k, m] of Object.entries(cat.markers)) {
      const i = getLatestValueIndex(m.values);
      if (i!==-1) { const v=m.values[i], s=getStatus(v,m.refMin,m.refMax);
        if (s==="high"||s==="low") flags.push({categoryKey:ck,name:m.name,value:formatValue(v),unit:m.unit,refMin:m.refMin,refMax:m.refMax,status:s});
      }
    }
  }
  return flags;
}
function getTrend(values) {
  const nn = values.filter(v=>v!==null);
  if (nn.length<2) return {arrow:"\u2014",cls:"trend-stable"};
  const pct = ((nn[nn.length-1]-nn[nn.length-2])/nn[nn.length-2])*100;
  if (Math.abs(pct)<2) return {arrow:"\u2192",cls:"trend-stable"};
  if (pct>0) return {arrow:`\u2191 +${pct.toFixed(1)}%`,cls:"trend-up"};
  return {arrow:`\u2193 ${pct.toFixed(1)}%`,cls:"trend-down"};
}
function formatValue(v) {
  if (v===null||v===undefined) return "\u2014";
  if (Number.isInteger(v)) return v.toString();
  if (Math.abs(v)>=100) return v.toFixed(0);
  if (Math.abs(v)>=10) return v.toFixed(1);
  if (Math.abs(v)>=1) return v.toFixed(2);
  return v.toFixed(3);
}

// PDF IMPORT
// ═══════════════════════════════════════════════
async function parseSpadiaPDF(file) {
  const arrayBuffer = await file.arrayBuffer();
  const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
  let allItems = [];
  for (let i = 1; i <= pdf.numPages; i++) {
    const page = await pdf.getPage(i);
    const textContent = await page.getTextContent();
    for (const item of textContent.items) {
      if (item.str.trim()) {
        allItems.push({ text: item.str.trim(), x: Math.round(item.transform[4]), y: Math.round(item.transform[5]), page: i });
      }
    }
  }
  const date = extractDateFromPDFText(allItems);
  const markers = extractMarkersFromPDFText(allItems);
  return { date, markers, fileName: file.name };
}

function extractDateFromPDFText(items) {
  for (const item of items) {
    if (/od(?:b|\u011b)r|datum/i.test(item.text)) {
      const match = item.text.match(/(\d{1,2})\.\s*(\d{1,2})\.\s*(\d{4})/);
      if (match) return `${match[3]}-${match[2].padStart(2,'0')}-${match[1].padStart(2,'0')}`;
    }
  }
  for (let i = 0; i < items.length; i++) {
    if (/od(?:b|\u011b)r|datum/i.test(items[i].text)) {
      for (let j = i+1; j < Math.min(i+8, items.length); j++) {
        const match = items[j].text.match(/(\d{1,2})\.\s*(\d{1,2})\.\s*(\d{4})/);
        if (match) return `${match[3]}-${match[2].padStart(2,'0')}-${match[1].padStart(2,'0')}`;
      }
    }
  }
  for (const item of items) {
    const match = item.text.match(/(\d{1,2})\.\s*(\d{1,2})\.\s*(\d{4})/);
    if (match && parseInt(match[3]) >= 2020 && parseInt(match[3]) <= 2030) {
      return `${match[3]}-${match[2].padStart(2,'0')}-${match[1].padStart(2,'0')}`;
    }
  }
  return null;
}

function extractMarkersFromPDFText(items) {
  const sorted = [...items].sort((a, b) => {
    const dy = b.y - a.y;
    return Math.abs(dy) > 3 ? dy : a.x - b.x;
  });
  const rows = [];
  let currentRow = [sorted[0]];
  for (let i = 1; i < sorted.length; i++) {
    if (Math.abs(sorted[i].y - currentRow[0].y) < 3) {
      currentRow.push(sorted[i]);
    } else {
      rows.push(currentRow.sort((a, b) => a.x - b.x));
      currentRow = [sorted[i]];
    }
  }
  if (currentRow.length > 0) rows.push(currentRow.sort((a, b) => a.x - b.x));
  const markers = [];
  for (const row of rows) {
    const parsed = parseDataRow(row);
    if (parsed) markers.push(parsed);
  }
  return markers;
}

const SPADIA_SECTION_HEADERS = ['biochemie','lipidy','hematologie','hormony','elektrolyty','miner\u00e1ly',
  'imunologie','koagulace','s\u00e9rologie','n\u00e1dorov\u00e9','thyreoidea','metabolismus','speci\u00e1ln\u00ed',
  'krevn\u00ed','diferenci\u00e1l','mast','vitaminy','proteiny'];

function parseDataRow(row) {
  let texts = row.map(r => r.text).filter(t => t.trim());
  if (texts.length < 2) return null;
  const fullText = texts.join(' ');
  if (/^(Vy\u0161et\u0159en\u00ed|V\u00fdsledek|Jednotky|Referen\u010dn\u00ed|Laborato|Strana|Datum|Pacient|Rod\.|Poji\u0161t|SPADIA|Zpracoval|Telefon|www\.|Identif|Materi\u00e1l)/i.test(fullText)) return null;
  // Skip urine tests (material code U anywhere in row)
  if (texts.some(t => t.trim() === 'U')) return null;
  // Remove standalone material codes (S=serum, B=blood, P=plasma) and section headers
  texts = texts.filter(t => {
    const s = t.trim();
    if (/^[SBP]$/.test(s)) return false;
    if (/^[SBP]\//.test(s)) return false; // S/xxx, B/xxx
    if (SPADIA_SECTION_HEADERS.some(h => s.toLowerCase() === h || s.toLowerCase().startsWith(h))) return false;
    return true;
  });
  if (texts.length < 2) return null;
  let valueIdx = -1, valueStr = '';
  for (let i = 0; i < texts.length; i++) {
    const cleaned = texts[i].replace(',', '.').replace(/^[<>]\s*/, '').trim();
    if (/^\d+\.?\d*$/.test(cleaned) && i > 0) { valueIdx = i; valueStr = texts[i]; break; }
  }
  if (valueIdx < 1) return null;
  let name = texts.slice(0, valueIdx).join(' ').trim();
  // Strip any remaining material code prefixes from the name
  name = name.replace(/^[SBP]\s+/, '').trim();
  if (!name || name.length < 2) return null;
  let value = parseFloat(valueStr.replace(',', '.').replace(/^[<>]\s*/, ''));
  if (isNaN(value)) return null;
  const restText = texts.slice(valueIdx + 1).join(' ');
  const refMatch = restText.match(/(\d+[.,]?\d*)\s*-\s*(\d+[.,]?\d*)/);
  let refMin = null, refMax = null;
  if (refMatch) {
    refMin = parseFloat(refMatch[1].replace(',', '.'));
    refMax = parseFloat(refMatch[2].replace(',', '.'));
  }
  // Name lookup: try exact, then case-insensitive, then fuzzy
  let mappedKey = SPADIA_NAME_MAP[name];
  if (!mappedKey) {
    // Try case-insensitive exact match
    const nameLower = name.toLowerCase();
    for (const [mapName, mapKey] of Object.entries(SPADIA_NAME_MAP)) {
      if (nameLower === mapName.toLowerCase()) { mappedKey = mapKey; break; }
    }
  }
  if (!mappedKey) {
    // Try prefix/suffix match
    const nameLower = name.toLowerCase();
    for (const [mapName, mapKey] of Object.entries(SPADIA_NAME_MAP)) {
      const ml = mapName.toLowerCase();
      if (nameLower.startsWith(ml) || ml.startsWith(nameLower) ||
          nameLower.endsWith(ml) || ml.endsWith(nameLower)) {
        mappedKey = mapKey; break;
      }
    }
  }
  if (!mappedKey) {
    // Try stripping common prefixes/suffixes and re-match
    const cleaned = name.replace(/^(S|B|P|celk\.|celkov[ýá])\s*/i, '').replace(/\s*(celk\.|celkov[ýá]|abs\.)$/i, '').trim();
    if (cleaned !== name) {
      mappedKey = SPADIA_NAME_MAP[cleaned];
      if (!mappedKey) {
        for (const [mapName, mapKey] of Object.entries(SPADIA_NAME_MAP)) {
          if (cleaned.toLowerCase() === mapName.toLowerCase()) { mappedKey = mapKey; break; }
        }
      }
    }
  }
  return { rawName: name, value, refMin, refMax, mappedKey, matched: !!mappedKey };
}

// ═══════════════════════════════════════════════
// IMPORT PREVIEW & CONFIRM
// ═══════════════════════════════════════════════
function showImportPreview(parseResult) {
  const { date, markers, fileName } = parseResult;
  const modal = document.getElementById("import-modal");
  const overlay = document.getElementById("import-modal-overlay");
  const dateFormatted = date ? new Date(date + 'T00:00:00').toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' }) : 'Unknown';
  const matched = markers.filter(m => m.matched);
  const unmatched = markers.filter(m => !m.matched);
  let html = `<button class="modal-close" onclick="closeImportModal()">&times;</button>
    <h3>Import Preview</h3>
    <p style="color:var(--text-secondary);margin-bottom:16px">
      File: ${fileName}<br>Collection Date: <strong>${dateFormatted}</strong><br>
      Matched: <span style="color:var(--green)">${matched.length}</span> \u00b7
      Unmatched: <span style="color:var(--yellow)">${unmatched.length}</span></p>`;
  if (!date) {
    html += `<div style="background:var(--red-bg);border:1px solid var(--red);border-radius:var(--radius-sm);padding:12px;margin-bottom:16px;color:var(--red)">
      Could not extract collection date from PDF. Import cannot proceed.</div>`;
    modal.innerHTML = html;
    overlay.classList.add("show");
    return;
  }
  html += `<table class="import-table"><thead><tr><th>Status</th><th>Test Name</th><th>Value</th><th>Maps To</th></tr></thead><tbody>`;
  for (const m of matched) {
    html += `<tr><td class="matched">\u2713 Matched</td><td>${m.rawName}</td>
      <td>${m.value}</td><td>${m.mappedKey}</td></tr>`;
  }
  for (const m of unmatched) {
    html += `<tr><td class="unmatched">? Unmatched</td><td>${m.rawName}</td>
      <td>${m.value}</td><td>\u2014</td></tr>`;
  }
  html += `</tbody></table>`;
  html += `<div style="display:flex;gap:12px;justify-content:flex-end;margin-top:20px">
    <button class="import-btn import-btn-secondary" onclick="closeImportModal()">Cancel</button>
    <button class="import-btn import-btn-primary" onclick="confirmImport()">Import ${matched.length} Markers</button></div>`;
  window._pendingImport = parseResult;
  modal.innerHTML = html;
  overlay.classList.add("show");
}

function closeImportModal() {
  document.getElementById("import-modal-overlay").classList.remove("show");
  window._pendingImport = null;
}

function confirmImport() {
  const result = window._pendingImport;
  if (!result || !result.date) return;
  const matched = result.markers.filter(m => m.matched);
  if (matched.length === 0) { showNotification("No matched markers to import", "error"); closeImportModal(); return; }
  const entry = { date: result.date, markers: {} };
  for (const m of matched) entry.markers[m.mappedKey] = m.value;
  if (entry.markers["hormones.insulin"] !== undefined) entry.markers["diabetes.insulin_d"] = entry.markers["hormones.insulin"];
  if (!importedData.entries) importedData.entries = [];
  importedData.entries = importedData.entries.filter(e => e.date !== result.date);
  importedData.entries.push(entry);
  recalculateHOMAIR(entry);
  localStorage.setItem('labcharts-imported', JSON.stringify(importedData));
  closeImportModal();
  buildSidebar();
  updateHeaderDates();
  const activeNav = document.querySelector(".nav-item.active");
  navigate(activeNav ? activeNav.dataset.category : "dashboard");
  showNotification(`Imported ${matched.length} markers from ${result.date}`, "success");
}

function removeImportedEntry(date) {
  if (!importedData.entries) return;
  importedData.entries = importedData.entries.filter(e => e.date !== date);
  localStorage.setItem('labcharts-imported', JSON.stringify(importedData));
  buildSidebar();
  updateHeaderDates();
  const activeNav = document.querySelector(".nav-item.active");
  navigate(activeNav ? activeNav.dataset.category : "dashboard");
  showNotification(`Removed imported data from ${date}`, "info");
}

// ═══════════════════════════════════════════════
// NOTIFICATIONS
// ═══════════════════════════════════════════════
function showNotification(message, type) {
  type = type || "info";
  const container = document.getElementById("notification-container");
  const toast = document.createElement("div");
  toast.className = `notification-toast ${type}`;
  const icons = { success: "\u2713", error: "\u2717", info: "\u2139" };
  toast.innerHTML = `<span>${icons[type] || "\u2139"}</span> ${message}`;
  container.appendChild(toast);
  setTimeout(() => {
    toast.style.opacity = "0"; toast.style.transform = "translateX(100%)"; toast.style.transition = "all 0.3s";
    setTimeout(() => toast.remove(), 300);
  }, 3000);
}

// ═══════════════════════════════════════════════
// DROP ZONE
// ═══════════════════════════════════════════════
function setupDropZone() {
  const dropZone = document.getElementById("drop-zone");
  if (!dropZone) return;
  dropZone.addEventListener("dragover", e => { e.preventDefault(); dropZone.classList.add("drag-over"); });
  dropZone.addEventListener("dragleave", e => { e.preventDefault(); dropZone.classList.remove("drag-over"); });
  dropZone.addEventListener("drop", async e => {
    e.preventDefault(); dropZone.classList.remove("drag-over");
    const files = Array.from(e.dataTransfer.files).filter(f => f.type === "application/pdf" || f.name.endsWith(".pdf"));
    if (files.length === 0) { showNotification("Please drop a PDF file", "error"); return; }
    await handlePDFFile(files[0]);
  });
}

async function handlePDFFile(file) {
  try {
    showNotification("Parsing PDF...", "info");
    const result = await parseSpadiaPDF(file);
    if (!result.date) { showNotification("Could not find collection date in PDF", "error"); return; }
    if (result.markers.length === 0) { showNotification("No biomarkers found in PDF", "error"); return; }
    showImportPreview(result);
  } catch (err) {
    console.error("PDF parse error:", err);
    showNotification("Error parsing PDF: " + err.message, "error");
  }
}
