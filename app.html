<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lab Charts — Blood Work Dashboard</title>
  <meta name="description" content="Track and visualize your blood work over time. AI-powered PDF import, trend detection, and health insights in a private, offline-first dashboard.">
  <meta property="og:title" content="Lab Charts — Blood Work Dashboard">
  <meta property="og:description" content="Track and visualize your blood work over time. AI-powered PDF import, trend detection, and health insights.">
  <meta property="og:type" content="website">
  <link rel="icon" type="image/svg+xml" href="icon.svg">
  <link rel="apple-touch-icon" href="icon-192.png">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#1a1d27">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <header class="header">
    <h1>Lab<span>Charts</span></h1>
    <div class="header-info">
      <div id="profile-selector"></div>
      <div id="header-dates"><span class="label">Dates:</span></div>
      <div id="header-range-toggle" class="range-toggle"></div>
      <button class="settings-btn" onclick="openSettingsModal()" title="Settings" aria-label="Settings">&#9881;</button>
      <button class="glossary-btn" onclick="openGlossary()" title="Marker Glossary" aria-label="Marker Glossary">&#128214;</button>
      <button class="chat-toggle-btn" onclick="toggleChatPanel()">Ask AI</button>
    </div>
  </header>

  <div class="layout">
    <nav class="sidebar" id="sidebar-nav"></nav>
    <main class="main" id="main-content"></main>
  </div>

  <div class="modal-overlay" id="modal-overlay">
    <div class="modal" id="detail-modal" role="dialog" aria-modal="true"></div>
  </div>

  <div class="modal-overlay" id="import-modal-overlay">
    <div class="modal" id="import-modal" role="dialog" aria-modal="true"></div>
  </div>

  <div class="modal-overlay" id="settings-modal-overlay">
    <div class="modal" id="settings-modal" role="dialog" aria-modal="true" aria-label="Settings"></div>
  </div>

  <div class="modal-overlay" id="glossary-modal-overlay">
    <div class="modal glossary-modal" id="glossary-modal" role="dialog" aria-modal="true" aria-label="Marker Glossary"></div>
  </div>

  <div class="chat-backdrop" id="chat-backdrop" onclick="closeChatPanel()"></div>
  <div class="chat-panel" id="chat-panel" role="complementary" aria-label="AI Lab Analyst">
    <div class="chat-header">
      <span class="chat-header-title">AI Lab Analyst</span>
      <div class="chat-header-actions">
        <button class="chat-clear-btn" onclick="clearChatHistory()" title="Clear history">Clear</button>
        <button class="chat-close-btn" onclick="closeChatPanel()" aria-label="Close chat">&times;</button>
      </div>
    </div>
    <div class="chat-personality-bar">
      <div class="chat-personality-current" onclick="togglePersonalityBar()">
        <span class="chat-personality-current-icon">🔬</span>
        <span class="chat-personality-current-name">AI Lab Analyst</span>
        <span class="chat-personality-current-arrow">▾</span>
      </div>
      <div class="chat-personality-options">
        <button class="chat-personality-opt active" data-personality="default" onclick="setChatPersonality('default')">
          <span class="chat-personality-opt-icon">🔬</span>
          <div class="chat-personality-opt-info">
            <span class="chat-personality-opt-name">AI Lab Analyst</span>
            <span class="chat-personality-opt-desc">Neutral, professional analysis</span>
          </div>
          <span class="chat-personality-opt-check">✓</span>
        </button>
        <div class="chat-personality-divider">Real Practitioners</div>
        <button class="chat-personality-opt" data-personality="kruse" onclick="setChatPersonality('kruse')">
          <span class="chat-personality-opt-icon">☀️</span>
          <div class="chat-personality-opt-info">
            <span class="chat-personality-opt-name">Dr. Jack Kruse</span>
            <span class="chat-personality-opt-desc">Mitochondria, light, water, magnetism</span>
          </div>
          <span class="chat-personality-opt-check">✓</span>
        </button>
        <div class="chat-personality-divider">Fictional Characters</div>
        <button class="chat-personality-opt" data-personality="house" onclick="setChatPersonality('house')">
          <span class="chat-personality-opt-icon">🦯</span>
          <div class="chat-personality-opt-info">
            <span class="chat-personality-opt-name">Dr. Gregory House</span>
            <span class="chat-personality-opt-desc">Sarcastic, brilliant, blunt</span>
          </div>
          <span class="chat-personality-opt-check">✓</span>
        </button>
        <button class="chat-personality-opt" data-personality="custom" onclick="setChatPersonality('custom')">
          <span class="chat-personality-opt-icon">✏️</span>
          <div class="chat-personality-opt-info">
            <span class="chat-personality-opt-name">Custom Personality</span>
            <span class="chat-personality-opt-desc">Define your own style</span>
          </div>
          <span class="chat-personality-opt-check">✓</span>
        </button>
        <div class="chat-personality-custom-area" style="display:none">
          <textarea class="chat-personality-custom-textarea" placeholder="Describe how you want the AI to communicate (e.g., 'Speak like a surfer dude who happens to be a doctor')..." rows="3"></textarea>
          <button class="chat-personality-custom-save" onclick="saveCustomPersonality()">Save</button>
        </div>
      </div>
    </div>
    <div class="chat-messages" id="chat-messages"></div>
    <div class="chat-input-area">
      <textarea class="chat-input" id="chat-input" placeholder="Ask about your lab results..." rows="2" onkeydown="handleChatKeydown(event)"></textarea>
      <button class="chat-send-btn" id="chat-send-btn" onclick="sendChatMessage()">Send</button>
    </div>
  </div>

  <input type="file" id="pdf-input" accept=".pdf,.json" style="display:none" multiple>
  <div class="notification-container" id="notification-container"></div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js" integrity="sha384-vsrfeLOOY6KuIYKDlmVH5UiBmgIdB1oEf7p01YgWHuqmOHfZr374+odEv96n9tNC" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.min.js" integrity="sha384-/1qUCSGwTur9vjf/z9lmu/eCUYbpOTgSjmpbMQZ1/CtX2v/WcAIKqRv+U1DUCG6e" crossorigin="anonymous"></script>
  <script src="app.js"></script>
  <script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('service-worker.js');
  }
  </script>
</body>
</html>
